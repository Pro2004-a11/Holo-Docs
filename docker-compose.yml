version: '3.9'

services:
  vision:
    build: ./vision
    ports:
      - "8001:8001"
    environment:
      - ORCHESTRATOR_URL=http://server:8080
    depends_on:
      - server
    restart: unless-stopped

  server:
    build: ./server
    ports:
      - "8080:8080"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - vision
      - server
    restart: unless-stopped

